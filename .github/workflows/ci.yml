name: CI

on:
  push:
    branches: [ main ]
    tags:    [ 'v*.*.*' ]       # trigger publish on version tags, e.g. v1.0.0
  pull_request:
    branches: [ main ]

jobs:
  # ── Build & Test ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history for SourceLink

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  # ── Pack & Publish ───────────────────────────────────────────────────────────
  publish:
    name: Pack & Publish to NuGet
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only run when a version tag is pushed — never on PRs or plain branch pushes.
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      # Strip the leading "v" from the tag (v1.2.3 → 1.2.3) and use it as the version.
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack EFCore.QueryGuard
        run: |
          dotnet pack src/EFCore.QueryGuard/EFCore.QueryGuard.csproj \
            --no-restore \
            --configuration Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --output ./nupkgs

      - name: Pack EFCore.QueryGuard.AspNetCore
        run: |
          dotnet pack src/EFCore.QueryGuard.AspNetCore/EFCore.QueryGuard.AspNetCore.csproj \
            --no-restore \
            --configuration Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --output ./nupkgs

      # Push each .nupkg individually — dotnet nuget push only accepts one file
      # at a time when the glob expands to multiple packages.
      - name: Publish to NuGet.org
        run: |
          for package in ./nupkgs/*.nupkg; do
            echo "Publishing $package..."
            dotnet nuget push "$package" \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source "https://api.nuget.org/v3/index.json" \
              --skip-duplicate
          done

      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.VERSION }}
          path: ./nupkgs/*.nupkg
